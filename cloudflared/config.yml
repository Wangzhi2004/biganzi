# Cloudflare Tunnel 配置模板
# 使用前请替换 your-domain.com 为你的实际域名
#
# 设置步骤：
# 1. 安装: winget install cloudflare.cloudflared
# 2. 登录: cloudflared tunnel login
# 3. 创建: cloudflared tunnel create biganzi
# 4. 复制此文件到 %USERPROFILE%\.cloudflared\config.yml
# 5. 修改下方域名
# 6. 在 Cloudflare DNS 添加 CNAME 记录:
#    m.your-domain.com → <tunnel-id>.cfargotunnel.com
# 7. 运行: cloudflared tunnel run biganzi
# 8. 开机自启: cloudflared service install

tunnel: biganzi
# credentials-file: C:\Users\<你的用户名>\.cloudflared\<tunnel-id>.json

ingress:
  # 移动端域名 → 本地 Next.js
  - hostname: m.your-domain.com
    service: http://localhost:3000
    originRequest:
      noTLSVerify: true
      connectTimeout: 30s

  # 兜底规则（必须放在最后）
  - service: http_status:404
