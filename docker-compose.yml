services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: biganzi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-biganzi2026}
      POSTGRES_DB: biganzi
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/setup-pgvector.sql:/docker-entrypoint-initdb.d/01-pgvector.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biganzi"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # 如果有本地构建产物，使用 local-build 阶段
      # 否则使用完整构建
      target: runner
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "80"
      DATABASE_URL: postgresql://biganzi:${DB_PASSWORD:-biganzi2026}@db:5432/biganzi
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL}
      AI_MODEL: ${AI_MODEL}
      AI_FAST_MODEL: ${AI_FAST_MODEL}
      AI_STRONG_MODEL: ${AI_STRONG_MODEL}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL}
      JWT_SECRET: ${JWT_SECRET}
      MOBILE_PASSWORD: ${MOBILE_PASSWORD}
      # 2GB服务器内存优化
      NODE_OPTIONS: "--max-old-space-size=256"
    ports:
      - "80:80"
    # 内存限制，防止OOM导致系统卡死
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  pgdata:
